<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - SimpleShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">SimpleShop</a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索商品...">
                <button onclick="goToSearch()">搜索</button>
            </div>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="cart.html" class="cart-link">
                    购物车
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="login.html" id="userLink">登录</a>
            </nav>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="main-content">
        <div class="container">
            <!-- 商品详情区域 -->
            <div class="product-detail" id="productDetail">
                <!-- 将通过 JS 动态渲染 -->
            </div>
            
            <!-- 用户评价区域 -->
            <div class="reviews-section">
                <h3>用户评价</h3>
                <div class="reviews-list" id="reviewsList">
                    <!-- 模拟评价数据 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 SimpleShop. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            
            const product = productsData.find(p => p.id === productId);
            
            if (!product) {
                document.getElementById('productDetail').innerHTML = '<p class="error-message">商品不存在</p>';
                return;
            }
            
            // 渲染商品详情
            const categoryNames = {
                'electronics': '数码电子',
                'clothing': '服装鞋帽',
                'home': '家居生活',
                'books': '图书音像',
                'beauty': '美妆护肤'
            };
            
            const discount = product.originalPrice 
                ? Math.round((1 - product.price / product.originalPrice) * 100) 
                : 0;
            
            document.getElementById('productDetail').innerHTML = `
                <div class="detail-image">
                    <img src="${product.image}" alt="${product.name}">
                </div>
                <div class="detail-info">
                    <h1>${product.name}</h1>
                    <div class="detail-price">
                        <span class="current-price">¥${product.price}</span>
                        ${product.originalPrice ? `<span class="original-price">¥${product.originalPrice}</span>` : ''}
                        ${discount > 0 ? `<span class="discount-tag">${discount}折</span>` : ''}
                    </div>
                    <p class="detail-description">${product.description}</p>
                    <div class="detail-meta">
                        <span>分类：${categoryNames[product.category] || '未分类'}</span>
                        <span>库存：${product.stock}件</span>
                        <span>评分：${'★'.repeat(product.rating)}${'☆'.repeat(5 - product.rating)}</span>
                    </div>
                    <div class="detail-actions">
                        <div class="quantity-selector">
                            <button onclick="changeQuantity(-1)">-</button>
                            <input type="number" id="quantityInput" value="1" min="1" max="${product.stock}">
                            <button onclick="changeQuantity(1)">+</button>
                        </div>
                        <button class="btn-add-cart" onclick="addToCartFromDetail('${product.id}')">加入购物车</button>
                        <button class="btn-buy-now" onclick="buyNow('${product.id}')">立即购买</button>
                    </div>
                </div>
            `;
            
            // 渲染评价
            const reviews = [
                { user: '用户A', rating: 5, comment: '质量很好，物流也很快！' },
                { user: '用户B', rating: 4, comment: '整体不错，就是包装可以再精美一些。' },
                { user: '用户C', rating: 5, comment: '非常满意，会再次购买！' }
            ];
            
            document.getElementById('reviewsList').innerHTML = reviews.map(review => `
                <div class="review-item">
                    <div class="review-header">
                        <span class="review-user">${review.user}</span>
                        <span class="review-rating">${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</span>
                    </div>
                    <p class="review-comment">${review.comment}</p>
                </div>
            `).join('');
        });
        
        function changeQuantity(delta) {
            const input = document.getElementById('quantityInput');
            let value = parseInt(input.value) + delta;
            if (value < 1) value = 1;
            if (value > parseInt(input.max)) value = parseInt(input.max);
            input.value = value;
        }
        
        function addToCartFromDetail(productId) {
            const quantity = parseInt(document.getElementById('quantityInput').value);
            addToCart(productId, quantity);
            alert('已加入购物车！');
        }
        
        function buyNow(productId) {
            const quantity = parseInt(document.getElementById('quantityInput').value);
            addToCart(productId, quantity);
            window.location.href = 'cart.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleShop - 简单购物网站</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">SimpleShop</a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索商品...">
                <button onclick="goToSearch()">搜索</button>
            </div>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="cart.html" class="cart-link">
                    购物车
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="login.html" id="userLink">登录</a>
            </nav>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="main-content">
        <div class="container">
            <div class="content-wrapper">
                <!-- 左侧分类导航 -->
                <aside class="sidebar">
                    <h3>商品分类</h3>
                    <ul class="category-list" id="categoryList">
                        <li><a href="category.html?category=all">全部商品</a></li>
                        <li><a href="category.html?category=electronics">数码电子</a></li>
                        <li><a href="category.html?category=clothing">服装鞋帽</a></li>
                        <li><a href="category.html?category=home">家居生活</a></li>
                        <li><a href="category.html?category=books">图书音像</a></li>
                        <li><a href="category.html?category=beauty">美妆护肤</a></li>
                    </ul>
                </aside>

                <!-- 右侧商品展示区 -->
                <section class="products-section">
                    <!-- 热门商品 -->
                    <div class="section-title">
                        <h2>🔥 热门推荐</h2>
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid" onclick="toggleView('grid')">网格视图</button>
                        <button class="view-btn" data-view="list" onclick="toggleView('list')">列表视图</button>
                    </div>
                    <div class="products-grid" id="productsGrid">
                        <!-- 商品将通过 JS 动态渲染 -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 SimpleShop. All rights reserved.</p>
        </div>
    </footer>

    <!-- 引入 JS 文件 -->
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

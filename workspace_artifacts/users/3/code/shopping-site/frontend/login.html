<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - SimpleShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">SimpleShop</a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索商品...">
                <button onclick="goToSearch()">搜索</button>
            </div>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="cart.html" class="cart-link">
                    购物车
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="login.html" id="userLink" class="active">登录</a>
            </nav>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="main-content">
        <div class="container">
            <div class="auth-container">
                <!-- 登录/注册表单切换 -->
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">登录</button>
                    <button class="auth-tab" onclick="switchTab('register')">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginUsername">用户名</label>
                        <input type="text" id="loginUsername" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">密码</label>
                        <input type="password" id="loginPassword" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn-submit">登录</button>
                </form>
                
                <!-- 注册表单 -->
                <form class="auth-form" id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerUsername">用户名</label>
                        <input type="text" id="registerUsername" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">邮箱</label>
                        <input type="email" id="registerEmail" required placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">密码</label>
                        <input type="password" id="registerPassword" required placeholder="请输入密码（至少6位）">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">确认密码</label>
                        <input type="password" id="confirmPassword" required placeholder="请再次输入密码">
                    </div>
                    <button type="submit" class="btn-submit">注册</button>
                </form>
                
                <p class="auth-tip" id="authTip"></p>
            </div>
            
            <!-- 用户信息展示（登录后） -->
            <div class="user-info" id="userInfo" style="display: none;">
                <div class="user-avatar">
                    <img src="https://via.placeholder.com/100" alt="用户头像" id="userAvatar">
                </div>
                <div class="user-details">
                    <h3>欢迎回来，<span id="displayUsername"></span>！</h3>
                    <p>邮箱：<span id="displayEmail"></span></p>
                </div>
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 SimpleShop. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = getCurrentUser();
            if (user) {
                showUserInfo(user);
            }
            
            // 隐藏顶部导航的用户链接，因为当前在登录页
            const userLink = document.getElementById('userLink');
            if (user) {
                userLink.textContent = user.username;
                userLink.href = 'login.html';
            }
        });
        
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.auth-tab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const authTip = document.getElementById('authTip');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                loginForm.style.display = 'flex';
                registerForm.style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                loginForm.style.display = 'none';
                registerForm.style.display = 'flex';
            }
            authTip.textContent = '';
        }
        
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const users = JSON.parse(localStorage.getItem('simpleshop_users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('simpleshop_current_user', JSON.stringify(user));
                showUserInfo(user);
            } else {
                document.getElementById('authTip').textContent = '用户名或密码错误';
                document.getElementById('authTip').style.color = 'red';
            }
        }
        
        function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                document.getElementById('authTip').textContent = '两次输入的密码不一致';
                document.getElementById('authTip').style.color = 'red';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('simpleshop_users') || '[]');
            
            if (users.some(u => u.username === username)) {
                document.getElementById('authTip').textContent = '用户名已存在';
                document.getElementById('authTip').style.color = 'red';
                return;
            }
            
            const newUser = { username, email, password };
            users.push(newUser);
            localStorage.setItem('simpleshop_users', JSON.stringify(users));
            
            document.getElementById('authTip').textContent = '注册成功！请登录';
            document.getElementById('authTip').style.color = 'green';
            
            setTimeout(() => switchTab('login'), 1500);
        }
        
        function showUserInfo(user) {
            document.querySelector('.auth-container').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('displayUsername').textContent = user.username;
            document.getElementById('displayEmail').textContent = user.email;
        }
        
        function logout() {
            localStorage.removeItem('simpleshop_current_user');
            window.location.reload();
        }
    </script>
</body>
</html>

services:
  backend:
    build:
      context: "D:/桌面/Java/AgentOffice/workspace_artifacts/code/personal-website"
      dockerfile: "D:/桌面/Java/AgentOffice/workspace_artifacts/deploy/personal-website/Dockerfile.backend"
    image: "agentoffice/personal-website:latest-backend"
    container_name: "agentoffice-personal-website-backend"
    labels:
      agentoffice.managed: "true"
      agentoffice.project: "personal-website"
    environment:
      PORT: "8080"
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "jdbc:mysql://agentoffice-mysql:3306/personal_website_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000"
      SPRING_DATASOURCE_USERNAME: "app_user"
      SPRING_DATASOURCE_PASSWORD: "app_password"
      MYSQL_HOST: "agentoffice-mysql"
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: "personal_website_db"
      MYSQL_USER: "app_user"
      MYSQL_PASSWORD: "app_password"

    ports:
      - "11718:8080"
    networks:
      - agentoffice-net

  frontend:
    build:
      context: "D:/桌面/Java/AgentOffice/workspace_artifacts/code/personal-website"
      dockerfile: "D:/桌面/Java/AgentOffice/workspace_artifacts/deploy/personal-website/Dockerfile.frontend"
    image: "agentoffice/personal-website:latest-frontend"
    container_name: "agentoffice-personal-website-frontend"
    labels:
      agentoffice.managed: "true"
      agentoffice.project: "personal-website"
    depends_on:
      - backend
    ports:
      - "11717:80"
    networks:
      - agentoffice-net

networks:
  agentoffice-net:
    external: true
    name: agentoffice-net


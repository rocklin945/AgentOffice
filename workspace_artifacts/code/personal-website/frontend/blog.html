<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客 - 个人网站</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="logo">My<span>Portfolio</span></a>
      <nav class="nav-menu" id="navMenu">
        <ul>
          <li><a href="index.html">首页</a></li>
          <li><a href="about.html">关于我</a></li>
          <li><a href="portfolio.html">作品集</a></li>
          <li><a href="blog.html" class="active">博客</a></li>
          <li><a href="contact.html">联系方式</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <button id="themeToggle" class="theme-toggle" aria-label="切换主题">
          <i class="fas fa-moon"></i>
        </button>
        <button class="hamburger" id="hamburger" aria-label="菜单">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <section class="page-banner">
    <div class="container">
      <h1>博客</h1>
      <p>分享技术思考与生活感悟</p>
    </div>
  </section>

  <section class="section blog-section">
    <div class="container">
      <div class="blog-layout">
        <div class="blog-main">
          <!-- 分类标签 -->
          <div class="blog-tags">
            <button class="tag-btn active" data-tag="all">全部</button>
            <button class="tag-btn" data-tag="前端">前端</button>
            <button class="tag-btn" data-tag="JavaScript">JavaScript</button>
            <button class="tag-btn" data-tag="设计">设计</button>
            <button class="tag-btn" data-tag="生活">生活</button>
          </div>

          <!-- 文章列表 -->
          <div class="blog-list" id="blogList">
            <!-- 由 JavaScript 动态渲染 -->
          </div>

          <!-- 分页 -->
          <div class="pagination" id="pagination">
            <!-- 由 JavaScript 动态渲染 -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 文章详情弹窗 -->
  <div class="modal" id="blogModal">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-lg">
      <button class="modal-close" id="blogModalClose"><i class="fas fa-times"></i></button>
      <div class="modal-body">
        <h2 id="blogModalTitle"></h2>
        <div class="blog-meta">
          <span id="blogModalDate"></span>
          <span id="blogModalTags"></span>
        </div>
        <div id="blogModalContent" class="blog-content"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <a href="index.html" class="logo">My<span>Portfolio</span></a>
          <p>用代码创造价值，用设计传递美好。</p>
        </div>
        <div class="footer-links">
          <h4>快速链接</h4>
          <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="about.html">关于我</a></li>
            <li><a href="portfolio.html">作品集</a></li>
            <li><a href="blog.html">博客</a></li>
            <li><a href="contact.html">联系方式</a></li>
          </ul>
        </div>
        <div class="footer-social">
          <h4>社交媒体</h4>
          <div class="social-icons">
            <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
            <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="#" aria-label="WeChat"><i class="fab fa-weixin"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2024 MyPortfolio. All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>

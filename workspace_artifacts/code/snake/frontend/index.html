<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 V1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f23;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background-color: #1a1a2e;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            color: #8b5cf6;
            margin-bottom: 5px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .score-board span {
            color: #e2e8f0;
        }

        .score-board .current-score {
            color: #4ade80;
            font-weight: bold;
        }

        .score-board .high-score {
            color: #8b5cf6;
            font-weight: bold;
        }

        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        #gameCanvas {
            border: 2px solid #8b5cf6;
            border-radius: 4px;
            background-color: #1a1a2e;
        }

        .footer {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }

        .footer .controls {
            margin-bottom: 8px;
        }

        .footer .status {
            color: #8b5cf6;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>贪吃蛇 V1.0</h1>
        </div>
        <div class="score-board">
            <span>分数: <span class="current-score" id="currentScore">0</span></span>
            <span>最高: <span class="high-score" id="highScore">0</span></span>
        </div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <div class="footer">
            <div class="controls">方向键移动 | 空格开始 | ESC暂停</div>
            <div class="status" id="statusText">按空格开始游戏</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 20;
        const COLS = canvas.width / GRID_SIZE;
        const ROWS = canvas.height / GRID_SIZE;
        const SPEED = 150;

        // 颜色配置
        const COLORS = {
            snakeBody: '#4ade80',
            snakeBodyEnd: '#22c55e',
            snakeHead: '#166534',
            food: '#ef4444',
            background: '#1a1a2e'
        };

        // 游戏状态
        const GameState = {
            IDLE: 'idle',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAMEOVER: 'gameover'
        };

        // 游戏变量
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let gameState = GameState.IDLE;
        let gameLoop = null;

        // DOM 元素
        const currentScoreEl = document.getElementById('currentScore');
        const highScoreEl = document.getElementById('highScore');
        const statusTextEl = document.getElementById('statusText');

        // 初始化
        function init() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            updateScore();
            generateFood();
            draw();
        }

        // 生成食物
        function generateFood() {
            let validPositions = [];
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    let isSnake = snake.some(segment => segment.x === x && segment.y === y);
                    if (!isSnake) {
                        validPositions.push({ x, y });
                    }
                }
            }
            if (validPositions.length > 0) {
                food = validPositions[Math.floor(Math.random() * validPositions.length)];
            }
        }

        // 绘制网格背景
        function drawBackground() {
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线
            ctx.strokeStyle = '#252542';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
        }

        // 绘制蛇
        function drawSnake() {
            snake.forEach((segment, index) => {
                const x = segment.x * GRID_SIZE;
                const y = segment.y * GRID_SIZE;

                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = COLORS.snakeHead;
                } else {
                    // 蛇身渐变
                    const progress = index / snake.length;
                    ctx.fillStyle = lerpColor(COLORS.snakeBody, COLORS.snakeBodyEnd, progress);
                }

                ctx.beginPath();
                ctx.roundRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2, 4);
                ctx.fill();
            });
        }

        // 绘制食物
        function drawFood() {
            const x = food.x * GRID_SIZE + GRID_SIZE / 2;
            const y = food.y * GRID_SIZE + GRID_SIZE / 2;
            const radius = GRID_SIZE / 2 - 2;

            ctx.fillStyle = COLORS.food;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // 颜色插值
        function lerpColor(color1, color2, t) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + (c2.r - c1.r) * t);
            const g = Math.round(c1.g + (c2.g - c1.g) * t);
            const b = Math.round(c1.b + (c2.b - c1.b) * t);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            };
        }

        // 绘制所有
        function draw() {
            drawBackground();
            drawFood();
            drawSnake();
        }

        // 绘制状态覆盖层
        function drawOverlay(text, subtext) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#e2e8f0';
            ctx.font = 'bold 24px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            if (subtext) {
                ctx.font = '16px Segoe UI';
                ctx.fillText(subtext, canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        // 更新分数显示
        function updateScore() {
            currentScoreEl.textContent = score;
            highScoreEl.textContent = highScore;
        }

        // 游戏逻辑更新
        function update() {
            if (gameState !== GameState.PLAYING) return;

            direction = { ...nextDirection };

            // 计算新头部位置
            const newHead = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 碰撞检测 - 撞墙
            if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
                gameOver();
                return;
            }

            // 碰撞检测 - 撞自身
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                gameOver();
                return;
            }

            // 添加新头部
            snake.unshift(newHead);

            // 检查是否吃到食物
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                updateScore();
                generateFood();
            } else {
                // 没有吃到食物，移除尾部
                snake.pop();
            }

            draw();
        }

        // 游戏结束
        function gameOver() {
            gameState = GameState.GAMEOVER;
            clearInterval(gameLoop);
            gameLoop = null;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                updateScore();
            }

            draw();
            drawOverlay('Game Over', `最终得分: ${score}`);
            statusTextEl.textContent = '游戏结束，按空格重新开始';
        }

        // 开始游戏
        function startGame() {
            gameState = GameState.PLAYING;
            statusTextEl.textContent = '游戏中...';
            gameLoop = setInterval(update, SPEED);
        }

        // 暂停游戏
        function togglePause() {
            if (gameState === GameState.PLAYING) {
                gameState = GameState.PAUSED;
                clearInterval(gameLoop);
                gameLoop = null;
                draw();
                drawOverlay('PAUSED', '按 ESC 继续');
                statusTextEl.textContent = '游戏暂停，按 ESC 继续';
            } else if (gameState === GameState.PAUSED) {
                gameState = GameState.PLAYING;
                statusTextEl.textContent = '游戏中...';
                gameLoop = setInterval(update, SPEED);
            }
        }

        // 键盘事件处理
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case ' ':
                    if (gameState === GameState.IDLE || gameState === GameState.GAMEOVER) {
                        init();
                        startGame();
                    }
                    e.preventDefault();
                    break;
                case 'Escape':
                    if (gameState === GameState.PLAYING || gameState === GameState.PAUSED) {
                        togglePause();
                    }
                    e.preventDefault();
                    break;
            }
        });

        // 初始化显示
        highScoreEl.textContent = highScore;
        init();
        drawOverlay('贪吃蛇', '按空格开始游戏');
    </script>
</body>
</html>
